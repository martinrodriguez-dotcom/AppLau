        function writeString(view, offset, string) {
          for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        }

        function pcmToWav(pcmData, sampleRate) {
          const numChannels = 1;
          const bitsPerSample = 16;
          const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
          const blockAlign = numChannels * (bitsPerSample / 8);
          const dataSize = pcmData.length * 2;
          const buffer = new ArrayBuffer(44 + dataSize);
          const view = new DataView(buffer);

          writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); writeString(view, 8, 'WAVE');
          writeString(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
          view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
          view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
          view.setUint16(34, bitsPerSample, true); writeString(view, 36, 'data');
          view.setUint32(40, dataSize, true);

          let offset = 44;
          for (let i = 0; i < pcmData.length; i++) { view.setInt16(offset, pcmData[i], true); offset += 2; }
          return buffer;
        }

        function base64ToInt16Array(base64) {
          const binaryString = window.atob(base64);
          const len = binaryString.length;
          const bytes = new Uint8Array(len);
          for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
          return new Int16Array(bytes.buffer);
        }

        const playPop = () => {
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.1);
          } catch(e) {}
        };

        const hablar = async (texto, velocidad = 0.85, silencio = false, forceNative = false) => {
          if (silencio) return;
          
          const pronunciarNativo = (txt) => {
            if (typeof window === 'undefined' || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(txt);
            utterance.rate = forceNative ? 0.7 : velocidad; 
            utterance.pitch = 1.35; 
            const voices = window.speechSynthesis.getVoices();
            const vozLatinaFemenina = voices.find(v => (v.lang.includes('es-MX') || v.lang.includes('es-US') || v.lang.includes('es-419')) && (v.name.toLowerCase().includes('mujer') || v.name.toLowerCase().includes('female') || v.name.includes('Paulina') || v.name.includes('Sabina'))) || voices.find(v => v.lang.includes('es-MX') || v.lang.includes('es-US'));
            if (vozLatinaFemenina) utterance.voice = vozLatinaFemenina;
            else utterance.lang = 'es-MX';
            window.speechSynthesis.speak(utterance);
          };

          // Si pedimos lectura nativa (ej. una sílaba)
          if (forceNative || texto.length <= 3) {
             pronunciarNativo(texto);
             return;
          }

          if (audioCache[texto]) {
            const audio = new Audio(audioCache[texto]);
            audio.playbackRate = velocidad;
            audio.play().catch(e => console.log(e));
            return;
          }

          try {
            const payload = {
              contents: [{ parts: [{ text: `Habla muy dulce, despacio y cariñosa para un niño pequeño, en español latino: ${texto}` }] }],
              generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
              },
              model: "gemini-2.5-flash-preview-tts"
            };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });

            const data = await response.json();
            const inlineData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
            
            if (inlineData) {
              const base64Audio = inlineData.data;
              const rateMatch = inlineData.mimeType.match(/rate=(\d+)/);
              const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;
              const pcmData = base64ToInt16Array(base64Audio);
              const wavBuffer = pcmToWav(pcmData, sampleRate);
              const blob = new Blob([wavBuffer], { type: 'audio/wav' });
              const url = URL.createObjectURL(blob);
              
              audioCache[texto] = url; 
              const audio = new Audio(url);
              audio.playbackRate = velocidad;
              await audio.play();
              return;
            } else {
              throw new Error("No data inline");
            }
          } catch (error) {
            console.log("Fallback a voz del navegador.");
            pronunciarNativo(texto);
          }
        };

          const [estadisticas, setEstadisticas] = useState({
            lectura: 0, letras_rapidas: 0, escritura: 0, asociacion: 0, aventura: 0
          });

          // Pre-cargar voces nativas
          useEffect(() => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
              window.speechSynthesis.getVoices(); 
            }
          }, []);

          // Inicializar Firebase
          useEffect(() => {
            let unsubscribeAuth;
            const initFirebase = async () => {
              try {
                const firebaseAppModule = await (new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js")'))();
                const firebaseAuthModule = await (new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js")'))();
                const firebaseFirestoreModule = await (new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")'))();

                const { initializeApp } = firebaseAppModule;
                const { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = firebaseAuthModule;
                const { getFirestore, doc, setDoc, getDoc } = firebaseFirestoreModule;

                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                if (!configStr) { console.warn("Firebase local mode"); return; }
                const config = typeof configStr === 'string' ? JSON.parse(configStr) : configStr;
                
                const firebaseApp = initializeApp(config);
                const firebaseAuth = getAuth(firebaseApp);
                const firestoreDb = getFirestore(firebaseApp);
                const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                
                window.fbDb = firestoreDb; window.fbAppId = currentAppId; window.fbSetDoc = setDoc; window.fbDoc = doc;

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(firebaseAuth, __initial_auth_token);
                } else {
                  await signInAnonymously(firebaseAuth);
                }

                unsubscribeAuth = onAuthStateChanged(firebaseAuth, (u) => {
                  setUser(u);
                  if (u) {
                    const docRef = doc(firestoreDb, 'artifacts', currentAppId, 'users', u.uid, 'game_data', 'stats');
                    getDoc(docRef).then(snap => {
                       if (snap.exists()) {
                          const data = snap.data();
                          if(data.estrellas) setEstrellas(data.estrellas);
                          if(data.juegos) setEstadisticas(prev => ({...prev, ...data.juegos}));
                          if(data.categoriaActiva) setCategoriaActiva(data.categoriaActiva);
                       }
                    });
                  }
                });
              } catch (e) { console.error("Firebase init error:", e); }
            };
            initFirebase();
            return () => { if (unsubscribeAuth) unsubscribeAuth(); };
          }, []);

          // Guardar progreso en Firebase cuando cambie
          useEffect(() => {
            if (user && window.fbDb && window.fbAppId) {
               const docRef = window.fbDoc(window.fbDb, 'artifacts', window.fbAppId, 'users', user.uid, 'game_data', 'stats');
               window.fbSetDoc(docRef, { estrellas, juegos: estadisticas, categoriaActiva }, {merge: true}).catch(e => console.log("Guardado local", e));

          // Timer Global de Sesión (10 Minutos)
          useEffect(() => {
            const timerId = setInterval(() => { setTiempoSesion(t => t + 1); }, 1000);
            return () => clearInterval(timerId);
          }, []);

          useEffect(() => {
            if (tiempoSesion >= 600 && vista !== 'pausa_forzada') {
              setVistaPrevia(vista === 'home' ? 'home' : vista);
              setVista('pausa_forzada');
            }
          }, [tiempoSesion, vista]);

          const lanzarFestejo = () => {
            reproducirFestejoAudio();
            setCelebrando(true);
            
            // Check si desbloqueó un sticker nuevo (cada 10 estrellas)
            const oldStars = estrellas;
            const newStars = estrellas + 1;
            if (newStars > 0 && newStars % 10 === 0 && newStars <= 60) {
               setTimeout(() => {
                 hablar(`¡Súper Lautaro! Desbloqueaste un nuevo sticker en tu Base Secreta.`, 1);
               }, 1000);
            }

            setTimeout(() => setCelebrando(false), 2500);

          const ganarEstrella = () => {
            setEstrellas(prev => prev + 1);
            lanzarFestejo();

          const irA = (nuevaVista) => {
            playPop();
            setVista(nuevaVista);

          return (

                 style={{ backgroundImage: 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '30px 30px' }}>
              
              {celebrando && <FireworksOverlay />}

              {vista !== 'pausa_forzada' && (
                <div className="w-full max-w-4xl flex justify-between items-center bg-white rounded-3xl shadow-lg p-4 mb-6 z-10 border-b-4 border-gray-200">
                  <button onClick={() => irA('home')} className="flex items-center gap-2 text-blue-500 font-bold text-xl hover:bg-blue-50 p-2 rounded-2xl transition">
                    <IconHome size={28} /> <span className="hidden sm:inline">Inicio</span>

                  <div className="flex items-center gap-4">
                    <div className="flex flex-col items-center px-4 bg-slate-100 rounded-xl py-1 border-2 border-slate-200 shadow-inner">
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Tiempo</span>
                      <span className="text-lg font-black text-blue-500">
                        {Math.floor((600 - tiempoSesion) / 60)}:{( (600 - tiempoSesion) % 60 ).toString().padStart(2, '0')}
                      </span>
                    </div>
                    <div className="flex items-center gap-2 bg-yellow-100 px-5 py-2 rounded-full border-4 border-yellow-300 shadow-inner">
                      <IconStar className="text-yellow-500 fill-yellow-500" size={32} />
                      <span className="text-3xl font-extrabold text-yellow-700">{estrellas}</span>
                    </div>
                  </div>
                  <button onClick={() => irA('adultos')} className="text-gray-400 hover:text-gray-600 p-2 transition-transform hover:rotate-90"><IconSettings size={28} /></button>
                </div>
              )}

              <div className="w-full max-w-4xl flex-1 flex flex-col">
                {vista === 'home' && <MenuPrincipal irA={irA} hablar={hablar} estrellas={estrellas} />}
                {vista === 'lectura' && <ModuloLectura ganarEstrella={ganarEstrella} hablar={hablar} playPop={playPop} registrar={registrarJuego} categoria={categoriaActiva} />}
                {vista === 'letras_rapidas' && <ModuloLetrasRapidas ganarEstrella={ganarEstrella} hablar={hablar} playPop={playPop} registrar={registrarJuego} />}
                {vista === 'escritura' && <ModuloEscritura ganarEstrella={ganarEstrella} hablar={hablar} playPop={playPop} registrar={registrarJuego} />}
                {vista === 'asociacion' && <ModuloAsociacion ganarEstrella={ganarEstrella} hablar={hablar} playPop={playPop} registrar={registrarJuego} categoria={categoriaActiva} />}

        // --- BASE SECRETA (ÁLBUM) ---
        function BaseSecreta({ hablar, estrellas, irA, playPop }) {

          return (
             <div className="flex-1 flex flex-col items-center p-6 bg-slate-900 rounded-[3rem] shadow-2xl border-8 border-slate-700 animate-fade-in text-center relative overflow-hidden w-full">

        // --- MÓDULOS CON SÍLABAS Y AYUDAS ---

        function ModuloLectura({ ganarEstrella, hablar, playPop, registrar, categoria }) {
          const [index, setIndex] = useState(0);
          const [escuchando, setEscuchando] = useState(false);
          const palabrasCategoria = DICCIONARIO[categoria] || DICCIONARIO['animales'];
          const palabra = palabrasCategoria[index % palabrasCategoria.length];

          useEffect(() => { hablar("Vamos a atrapar palabras. Toca el micrófono y lee fuerte, o toca las sílabas para escucharlas.", 1); }, []);

          const escucharMicrofono = () => {
            if (escuchando) return;
            playPop();
            setEscuchando(true);
            
            const secuenciaExito = () => {
                setEscuchando(false); 
                ganarEstrella(); 
                registrar('lectura'); 
                avanzar();
            };

            try {
              const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              if (!SpeechRecognition) throw new Error("No Soportado");
              const recognition = new SpeechRecognition();
              recognition.lang = 'es-MX';
              let timeoutCompletado = false;
              
              const timer = setTimeout(() => { timeoutCompletado = true; recognition.stop(); secuenciaExito(); }, 4000);
              recognition.onresult = () => { if(!timeoutCompletado) { clearTimeout(timer); secuenciaExito(); } };
              recognition.onerror = () => {};
              recognition.start();
            } catch (e) {
              setTimeout(() => { secuenciaExito(); }, 4000);
            }
          };

          const avanzar = () => { setTimeout(() => { setIndex((prev) => prev + 1); }, 3000); };

          if (!palabra) return null;

          return (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-red-50 bg-spider-web rounded-[3rem] shadow-xl border-8 border-red-500 animate-fade-in text-center z-10 relative overflow-hidden">
              <div className="bg-white px-6 py-3 rounded-full border-4 border-red-500 shadow-[0_4px_0_rgb(239,68,68)] text-red-600 mb-6 flex items-center gap-3 font-bold text-2xl z-10">
                <div className="w-10 h-10"><IconoSpidey/></div> <span className="uppercase tracking-wider">Misión Arañín</span>
              </div>
              
              <div className="bg-white w-full max-w-lg rounded-[2rem] p-8 mb-8 border-8 border-red-200 shadow-2xl flex flex-col items-center z-10 anim-pop">
                <div className="text-[120px] sm:text-[150px] leading-none mb-8 hover:scale-110 transition-transform drop-shadow-xl cursor-pointer" onClick={playPop}>{palabra.emoji}</div>
                
                <div className="flex justify-center gap-3 sm:gap-6 flex-wrap w-full">
                  {/* MÉTODO SILÁBICO APLICADO AQUÍ */}
                  {palabra.silabas.map((silaba, i) => (
                    <button key={i} onClick={() => { playPop(); hablar(silaba.toLowerCase(), 1, false, true); }} className="btn-game bg-gradient-to-b from-blue-400 to-blue-600 border-4 border-blue-800 text-white shadow-[0_6px_0_rgb(30,64,175)] font-black text-5xl sm:text-6xl px-6 py-4 rounded-3xl hover:brightness-110 tracking-widest">
                      {silaba}
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex flex-col sm:flex-row gap-6 w-full max-w-md z-10">
                <button onClick={() => { playPop(); hablar(`Es la palabra ${palabra.texto}.`, 0.9); }} className="btn-game flex-1 bg-yellow-400 border-4 border-yellow-600 text-yellow-900 shadow-[0_6px_0_rgb(161,98,7)] font-black text-2xl py-5 rounded-[2rem] flex justify-center items-center gap-3">
                  <IconVolume size={36} /> Escuchar
                </button>
                <button onClick={escucharMicrofono} className={`btn-game flex-1 font-black text-2xl py-5 rounded-[2rem] border-4 flex justify-center items-center gap-3 shadow-[0_6px_0_rgba(0,0,0,0.3)] ${escuchando ? 'bg-red-500 border-red-800 text-white animate-pulse' : 'bg-green-500 border-green-800 text-white'}`}>
                  <IconMic size={36} /> {escuchando ? '¡Habla!' : 'Micrófono'}
                </button>
              </div>
            </div>
          );
        }

        function ModuloLetrasRapidas({ ganarEstrella, hablar, playPop, registrar }) {
          const [estado, setEstado] = useState('inicio'); 
          const [letraObjetivo, setLetraObjetivo] = useState('');
          const [cuadricula, setCuadricula] = useState([]);
          const [errorId, setErrorId] = useState(null);

          useEffect(() => { hablar("Soy Rayo Veloz. Observa bien esta letra, y luego encuéntrala en la sopa de letras.", 1); iniciarRonda(); }, []);

          const iniciarRonda = () => {
            const abecedario = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            const target = abecedario[Math.floor(Math.random() * abecedario.length)];
            let letrasGrilla = abecedario.filter(l => l !== target).sort(() => 0.5 - Math.random()).slice(0, 15);
            letrasGrilla.push(target); letrasGrilla.sort(() => 0.5 - Math.random());
            setLetraObjetivo(target); setCuadricula(letrasGrilla.map((l, index) => ({ id: index, letra: l })));
            setEstado('mostrando');
          };

          useEffect(() => {
            if (estado === 'mostrando') {
              const timer = setTimeout(() => { setEstado('buscando'); }, 5000);
              return () => clearTimeout(timer);
            }
          }, [estado]);

          const elegir = (opcion) => {
            playPop();
            if (opcion.letra === letraObjetivo) {
              ganarEstrella(); registrar('letras_rapidas'); setEstado('festejo'); setTimeout(() => iniciarRonda(), 3000); 
            } else {
              hablar("¡Casi! Sigue buscando.", 1); setErrorId(opcion.id); setTimeout(() => setErrorId(null), 500);
            }
          };

          return (
            <div className="flex-1 flex flex-col items-center justify-center p-4 bg-slate-900 rounded-[3rem] shadow-2xl border-8 border-yellow-500 animate-fade-in text-center relative overflow-hidden">
              <div className="bg-gradient-to-r from-red-600 to-red-800 px-6 py-3 rounded-full border-4 border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.5)] text-white mb-6 flex items-center gap-3 font-black text-2xl z-10">
                <div className="w-10 h-10"><IconoFlash/></div> <span className="uppercase tracking-widest text-yellow-300">Rayo Veloz</span>
              </div>

              {estado === 'mostrando' && (
                <div className="flex flex-col items-center z-10 anim-pop w-full max-w-sm">
                  <div className="text-3xl font-bold text-white mb-4 bg-black/50 px-6 py-2 rounded-full">Recuerda la letra</div>
                  <div className="flex items-center justify-center w-64 h-64 bg-yellow-400 rounded-full border-8 border-white shadow-[0_0_40px_yellow]">
                    <div className="text-[150px] font-black text-red-700">{letraObjetivo}</div>
                  </div>
                  <div className="w-full h-6 bg-slate-800 rounded-full mt-10 overflow-hidden border-2 border-slate-700 shadow-inner">
                    <div className="h-full bg-gradient-to-r from-red-500 to-yellow-400 animate-[shrink_5s_linear_forwards] origin-left"></div>
                  </div>
                </div>
              )}

              {estado === 'buscando' && (
                <div className="w-full max-w-lg anim-pop bg-slate-800/80 backdrop-blur-md p-6 sm:p-8 rounded-[3rem] border-4 border-yellow-500 shadow-[0_0_30px_rgba(250,204,21,0.3)] z-10 flex flex-col items-center">
                  <h3 className="text-3xl font-black mb-6 text-yellow-400 uppercase tracking-widest text-center">¡Encuentra la {letraObjetivo}!</h3>
                  <div className="grid grid-cols-4 gap-3 sm:gap-4 w-full max-w-[400px]">
                    {cuadricula.map((item) => (
                      <button key={item.id} onClick={() => elegir(item)} className={`btn-game aspect-square flex items-center justify-center bg-white border-4 border-gray-300 rounded-2xl shadow-[0_6px_0_rgb(209,213,219)] text-4xl sm:text-5xl font-black text-slate-800 hover:bg-yellow-100 ${errorId === item.id ? 'animate-error border-red-500 bg-red-100 text-red-700 shadow-[0_6px_0_rgb(239,68,68)]' : ''}`}>
                        {item.letra}
                      </button>
                    ))}

                </div>
              )}

              {estado === 'festejo' && (
                <div className="z-10 text-[180px] font-black text-yellow-400 anim-pop drop-shadow-[0_0_40px_yellow]">{letraObjetivo}</div>
              )}
            </div>
          );
        }

        function ModuloEscritura({ ganarEstrella, hablar, playPop, registrar }) {
          const canvasRef = useRef(null);
          const [letraIndex, setLetraIndex] = useState(0);
          const [dibujando, setDibujando] = useState(false);
          const letraObj = LETRAS_TRAZO[letraIndex % LETRAS_TRAZO.length];

          useEffect(() => { hablar("Fuerza Verde aplasta. Dibuja la letra empezando por el punto rojo.", 1); }, []);
          useEffect(() => { if (letraObj) dibujarPlantilla(); }, [letraIndex]);

          const dibujarPlantilla = () => {
            const canvas = canvasRef.current; if (!canvas) return;
            const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar la letra de fondo
            ctx.font = 'bold 240px Arial'; ctx.fillStyle = '#e5e7eb'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(letraObj.letra, canvas.width / 2, canvas.height / 2 + 20);
            
            // INDICADOR VISUAL DE INICIO (Punto Rojo)
            ctx.beginPath();
            ctx.arc((canvas.width/2) + letraObj.startX, (canvas.height/2) + letraObj.startY + 20, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#ef4444'; // Red brillante
            ctx.fill();
            // Borde blanco al punto
            ctx.lineWidth = 4; ctx.strokeStyle = 'white'; ctx.stroke();
          };

          const getCoordenadas = (e) => {
            const canvas = canvasRef.current; const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
          };

          const iniciarTrazo = (e) => { e.preventDefault(); setDibujando(true); const pos = getCoordenadas(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
          const trazar = (e) => { e.preventDefault(); if (!dibujando) return; const pos = getCoordenadas(e); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(pos.x, pos.y); ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 24; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke(); };
          const terminarTrazo = () => setDibujando(false);

          const validarTrazo = () => {
            playPop(); ganarEstrella(); registrar('escritura');
            const canvas = canvasRef.current; canvas.classList.add('anim-pop');
            setTimeout(() => canvas.classList.remove('anim-pop'), 500);
            setTimeout(() => { setLetraIndex((prev) => prev + 1); }, 3000);
          };

          if (!letraObj) return null;

          return (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-stone-800 rounded-[3rem] shadow-2xl border-8 border-stone-600 animate-fade-in text-center relative overflow-hidden">
              <div className="bg-green-500 px-6 py-3 rounded-full border-4 border-green-700 shadow-[0_4px_0_rgb(21,128,61)] text-white mb-6 flex items-center gap-3 font-black text-2xl z-10">
                <div className="w-10 h-10"><IconoHulk/></div> <span className="uppercase tracking-widest">Fuerza Verde</span>
              </div>
              
              <div className="relative bg-stone-200 border-[12px] border-stone-400 rounded-[3rem] overflow-hidden touch-none shadow-[inset_0_10px_20px_rgba(0,0,0,0.5)] mb-8 anim-pop">
                <canvas ref={canvasRef} width={300} height={300} className="bg-white cursor-crosshair"
                  onMouseDown={iniciarTrazo} onMouseMove={trazar} onMouseUp={terminarTrazo} onMouseOut={terminarTrazo}
                  onTouchStart={iniciarTrazo} onTouchMove={trazar} onTouchEnd={terminarTrazo}
                />
              </div>

              <div className="flex gap-6 w-full max-w-sm z-10">
                <button onClick={() => { playPop(); dibujarPlantilla(); }} className="btn-game flex-1 bg-stone-300 text-stone-700 font-black text-xl py-5 rounded-[2rem] border-4 border-stone-500 shadow-[0_6px_0_rgb(120,113,108)] flex justify-center items-center gap-2">
                  <IconRefresh size={28} /> Limpiar
                </button>
                <button onClick={validarTrazo} className="btn-game flex-1 bg-gradient-to-b from-green-400 to-green-600 text-white font-black text-2xl py-5 rounded-[2rem] border-4 border-green-800 shadow-[0_6px_0_rgb(22,101,52)] flex justify-center items-center gap-2">
                  <IconCheck size={28} /> ¡LISTO!
                </button>
              </div>
            </div>
          );
        }

        function ModuloAsociacion({ ganarEstrella, hablar, playPop, registrar, categoria }) {
          const [index, setIndex] = useState(0);
          const [opciones, setOpciones] = useState([]);
          const [errorId, setErrorId] = useState(null); 
          
          const palabrasCategoria = DICCIONARIO[categoria] || DICCIONARIO['animales'];
          const palabraCorrecta = palabrasCategoria[index % palabrasCategoria.length];

          useEffect(() => { hablar("Capitán Valor al rescate. Toca la imagen que le corresponde a la palabra.", 1); }, []);

          useEffect(() => {
            if(!palabraCorrecta) return;
            // Mezclar todas las palabras, sacar la correcta, tomar 2 incorrectas aleatorias
            let todas = [];
            Object.values(DICCIONARIO).forEach(arr => todas = todas.concat(arr));
            let incorrectas = todas.filter(p => p.id !== palabraCorrecta.id);
            incorrectas.sort(() => 0.5 - Math.random());
            let seleccion = [palabraCorrecta, incorrectas[0], incorrectas[1]];
            seleccion.sort(() => 0.5 - Math.random());
            setOpciones(seleccion);
          }, [index, palabraCorrecta]);

          const seleccionarOpcion = (opcion) => {
            playPop();
            if (opcion.id === palabraCorrecta.id) {
              ganarEstrella(); registrar('asociacion');
              setTimeout(() => setIndex((prev) => prev + 1), 3000); 
            } else {
              // CORRECCIÓN POSITIVA CON VOZ NEURONAL
              hablar(`Ese es el ${opcion.texto.toLowerCase()}. ¡Busquemos ${palabraCorrecta.texto.toLowerCase()}!`, 0.9); 
              setErrorId(opcion.id);
              setTimeout(() => setErrorId(null), 500); 
            }
          };

          if (!palabraCorrecta) return null;

          return (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-gradient-to-br from-blue-50 to-blue-200 rounded-[3rem] shadow-xl border-8 border-blue-400 animate-fade-in text-center relative overflow-hidden">
              <div className="bg-blue-600 px-6 py-3 rounded-full border-4 border-blue-800 shadow-[0_4px_0_rgb(30,64,175)] text-white mb-8 flex items-center gap-3 font-black text-2xl z-10">
                <div className="w-12 h-12"><IconoCapitan/></div> <span className="uppercase tracking-widest">Capitán Valor</span>
              </div>

              <div className="bg-white border-8 border-blue-500 rounded-[3rem] px-12 py-8 mb-12 shadow-[0_10px_20px_rgba(0,0,0,0.15)] anim-pop z-10 relative cursor-pointer hover:scale-105 transition-transform" onClick={() => {playPop(); hablar(palabraCorrecta.texto);}}>
                <div className="absolute -top-6 -right-6 bg-red-500 w-12 h-12 rounded-full border-4 border-white flex items-center justify-center shadow-md"><span className="text-white font-bold">🎯</span></div>
                <h2 className="text-5xl sm:text-7xl font-black text-blue-900 tracking-widest uppercase drop-shadow-md">{palabraCorrecta.texto}</h2>
              </div>

              <div className="flex justify-center gap-6 sm:gap-10 flex-wrap z-10">
                {opciones.map((opcion, i) => (
                  <button key={i} onClick={() => seleccionarOpcion(opcion)} className={`btn-game bg-white border-8 border-gray-200 rounded-[2.5rem] p-8 sm:p-10 text-[80px] sm:text-[100px] leading-none shadow-[0_8px_0_rgb(209,213,219)] flex flex-col items-center hover:bg-blue-50 hover:border-blue-400 ${errorId === opcion.id ? 'animate-error border-red-500 bg-red-50 shadow-[0_8px_0_rgb(239,68,68)]' : ''}`}>
                    <span className="drop-shadow-lg">{opcion.emoji}</span>
                  </button>
                ))}
              </div>
            </div>
          );
        }

        function ModuloAventura({ ganarEstrella, hablar, playPop, registrar, onFinish }) {
          const [heroeSeleccionado, setHeroeSeleccionado] = useState(null);
          const [paso, setPaso] = useState(0);
          const [historia, setHistoria] = useState([]);
          const canvasRef = useRef(null);
          const [errorId, setErrorId] = useState(null);

          useEffect(() => { hablar("¡Bienvenido a Mi Aventura, Lautaro! ¿A qué superhéroe vas a elegir para cumplir esta misión secreta?", 1); }, []);

          const seleccionarHeroe = (id) => {
            playPop(); setHeroeSeleccionado(id); let nuevaHistoria = [];
            if (id === 'hulk') {
              nuevaHistoria = [[{ texto: "¡Un puente roto! Dibuja la 'U' grande para unirlo.", letra: 'U' }, { texto: "¡Roca en el camino! Dibuja la 'O' para hacerla rodar.", letra: 'O' }][Math.floor(Math.random() * 2)]];
              hablar("¡Genial! Fuerza Verde está listo para la misión.");
            } else if (id === 'flash') {
              nuevaHistoria = [[{ texto: "Un perrito escapa muy rápido. Encuentra la 'P' para alcanzarlo.", target: 'P', falseLetras: ['D', 'B', 'R'] }, { texto: "Un globo se voló alto. Encuentra la 'G' para atraparlo.", target: 'G', falseLetras: ['C', 'O', 'Q'] }][Math.floor(Math.random() * 2)]];
              hablar("¡Súper! Rayo Veloz entra en acción.");
            } else if (id === 'spidey') {
              nuevaHistoria = [[{ texto: "¡Lautaro necesita ayuda! Lee la palabra 'RED' para lanzarla.", palabra: 'RED' }, { texto: "¡Atrapa al villano! Lee la palabra 'TELA' para frenarlo.", palabra: 'TELA' }][Math.floor(Math.random() * 2)]];
              hablar("¡Mira nomás! Arañín lanza su red.");
            } else if (id === 'capi') {
              nuevaHistoria = [[{ texto: "Escudo sin poder. Encuentra la ESTRELLA para activarlo.", correctEmoji: '⭐', falsos: ['🌙', '☀️'] }, { texto: "Puerta secreta cerrada. Encuentra la LLAVE para pasar.", correctEmoji: '🔑', falsos: ['🗡️', '🛡️'] }][Math.floor(Math.random() * 2)]];
              hablar("¡Guau! Capitán Valor viene al rescate.");
            }
            setHistoria(nuevaHistoria);
          };

          const resolverPaso = () => {
            playPop(); ganarEstrella(); registrar('aventura');
            setTimeout(() => {
              hablar("¡Misión Completada! Lo hicimos súper bien Lautaro.");
              setTimeout(() => { setHeroeSeleccionado(null); hablar("¿A quién elegimos ahora para la próxima misión?", 1); }, 3000);
            }, 2000);
          };

          if (!heroeSeleccionado) {
            return (
              <div className="flex-1 flex flex-col items-center justify-center w-full animate-fade-in">
                <h2 className="text-4xl font-black text-purple-800 mb-8 bg-purple-100 px-8 py-4 rounded-full border-4 border-purple-300 shadow-md">¿Quién hará la misión?</h2>
                <div className="grid grid-cols-2 gap-6 w-full max-w-lg px-4">
                  <button onClick={() => seleccionarHeroe('spidey')} className="btn-game bg-red-500 border-4 border-red-800 text-white p-6 rounded-3xl shadow-[0_6px_0_rgb(153,27,27)] font-black text-2xl flex flex-col items-center justify-center gap-2"><div className="w-16 h-16"><IconoSpidey/></div> Arañín</button>
                  <button onClick={() => seleccionarHeroe('flash')} className="btn-game bg-yellow-400 border-4 border-yellow-700 text-yellow-900 p-6 rounded-3xl shadow-[0_6px_0_rgb(161,98,7)] font-black text-2xl flex flex-col items-center justify-center gap-2"><div className="w-16 h-16"><IconoFlash/></div> Rayo</button>
                  <button onClick={() => seleccionarHeroe('hulk')} className="btn-game bg-green-500 border-4 border-green-800 text-white p-6 rounded-3xl shadow-[0_6px_0_rgb(22,101,52)] font-black text-2xl flex flex-col items-center justify-center gap-2"><div className="w-16 h-16"><IconoHulk/></div> Fuerza</button>
                  <button onClick={() => seleccionarHeroe('capi')} className="btn-game bg-blue-500 border-4 border-blue-800 text-white p-6 rounded-3xl shadow-[0_6px_0_rgb(30,64,175)] font-black text-2xl flex flex-col items-center justify-center gap-2"><div className="w-16 h-16"><IconoCapitan/></div> Valor</button>
                </div>
              </div>
            );
          }

          const escena = historia[paso]; if (!escena) return null;

          let HeroeIcono = IconoHulk;
          if(heroeSeleccionado === 'flash') HeroeIcono = IconoFlash;
          if(heroeSeleccionado === 'spidey') HeroeIcono = IconoSpidey;
          if(heroeSeleccionado === 'capi') HeroeIcono = IconoCapitan;

          return (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-purple-50 border-8 border-purple-400 rounded-3xl shadow-xl animate-fade-in text-center z-10 relative">
              <div className="bg-white px-8 py-6 rounded-3xl shadow-lg border-4 border-gray-800 mb-8 w-full max-w-2xl relative cursor-pointer hover:scale-105 transition-transform" onClick={() => {playPop(); hablar(escena.texto)}}>
                <p className="text-3xl sm:text-4xl font-bold text-gray-800 leading-relaxed text-center">"{escena.texto}"</p>
              </div>
              <div className="absolute -top-6 bg-purple-500 p-3 rounded-full border-4 border-white shadow-lg w-24 h-24"><HeroeIcono /></div>

              {heroeSeleccionado === 'hulk' && (
                <div className="w-full flex flex-col items-center anim-pop mt-4">
                   <div className="relative bg-stone-200 border-[8px] border-stone-400 rounded-3xl overflow-hidden touch-none mb-6">
                     <canvas ref={canvasRef} width={280} height={280} className="bg-white cursor-pointer"
                       onMouseDown={(e) => { e.target.getContext('2d').beginPath(); e.target.getContext('2d').moveTo(e.nativeEvent.offsetX, e.nativeEvent.offsetY); }}
                       onMouseMove={(e) => { if(e.buttons > 0) { let ctx = e.target.getContext('2d'); ctx.lineTo(e.nativeEvent.offsetX, e.nativeEvent.offsetY); ctx.strokeStyle='#22c55e'; ctx.lineWidth=20; ctx.lineCap='round'; ctx.stroke(); } }}
                       onTouchMove={(e) => { let rect = e.target.getBoundingClientRect(); let ctx = e.target.getContext('2d'); ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); ctx.strokeStyle='#22c55e'; ctx.lineWidth=20; ctx.lineCap='round'; ctx.stroke(); }}
                     />
                     <div className="absolute inset-0 pointer-events-none flex items-center justify-center text-[200px] font-bold text-gray-200 opacity-50">{escena.letra}</div>
                   </div>
                   <button onClick={resolverPaso} className="btn-game bg-green-500 border-4 border-green-800 text-white font-black text-3xl py-4 px-12 rounded-[2rem] shadow-[0_8px_0_rgb(22,101,52)]">¡Fuerza!</button>
                </div>
              )}

              {heroeSeleccionado === 'flash' && (
                <div className="grid grid-cols-2 gap-6 w-full max-w-sm anim-pop mt-4">
                  {[escena.target, ...escena.falseLetras].sort(()=>Math.random() - 0.5).map((l, i) => (
                    <button key={i} onClick={() => { playPop(); l === escena.target ? resolverPaso() : (setErrorId(l), setTimeout(()=>setErrorId(null), 500)); }} className={`btn-game border-4 rounded-3xl p-8 text-6xl font-black shadow-[0_6px_0_rgb(161,98,7)] bg-yellow-400 text-yellow-900 border-yellow-600 ${errorId===l ? 'animate-error bg-red-400 text-white shadow-[0_6px_0_rgb(153,27,27)] border-red-800' : ''}`}>
                      {l}
                    </button>
                  ))}
                </div>
              )}

              {heroeSeleccionado === 'spidey' && (
                <div className="flex flex-col items-center anim-pop mt-4">
                  <button onClick={resolverPaso} className="btn-game bg-red-500 border-8 border-red-800 rounded-[3rem] p-12 text-[80px] font-black text-white shadow-[0_12px_0_rgb(153,27,27)] uppercase tracking-widest hover:scale-110 transition-transform">
                    {escena.palabra}
                  </button>
                </div>
              )}

              {heroeSeleccionado === 'capi' && (
                <div className="flex justify-center gap-6 flex-wrap anim-pop mt-4">
                  {[escena.correctEmoji, ...escena.falsos].sort(()=>Math.random() - 0.5).map((em, i) => (
                    <button key={i} onClick={() => { playPop(); em === escena.correctEmoji ? resolverPaso() : (setErrorId(em), setTimeout(()=>setErrorId(null), 500)); }} className={`btn-game bg-white border-8 border-blue-300 rounded-full p-8 text-[80px] leading-none shadow-[0_8px_0_rgb(147,197,253)] ${errorId===em ? 'animate-error bg-red-100 border-red-500 shadow-[0_8px_0_rgb(239,68,68)]' : ''}`}>
                      {em}
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        }

        // =========================================================================
        // PANEL ADULTOS Y PAUSA FORZADA
        // =========================================================================

        function PausaObligatoria({ reanudar, hablar, playPop }) {
          const [fase, setFase] = useState('respirar'); 
          const [segundos, setSegundos] = useState(30);
          const [reto, setReto] = useState(null);

          useEffect(() => {
            if (fase === 'respirar') {
              hablar("¡Hola Lautaro! Llegó la hora de descansar un poquito. Vamos a respirar profundo durante 30 segundos, ¿me acompañas?", 0.9);
              const timer = setInterval(() => { setSegundos(s => { if (s <= 1) { clearInterval(timer); setFase('boton'); return 0; } return s - 1; }); }, 1000);
              return () => clearInterval(timer);
            } else if (fase === 'boton') {
              hablar("¡Qué lindo descanso! Toca el botón de desbloquear para que sigamos jugando.", 1);
            }
          }, [fase]);

          const abrirMiniJuego = () => { playPop(); const minijuegos = ['buscar_letra', 'tocar_letra']; setReto(minijuegos[Math.floor(Math.random() * minijuegos.length)]); setFase('minijuego'); };
          const resolverMiniJuego = () => { playPop(); hablar("¡Yuuuupi! ¡Lo lograste!", 1); reproducirFestejoAudio(); setTimeout(reanudar, 1500); };

          return (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-teal-50 rounded-[3rem] shadow-2xl border-8 border-teal-500 animate-fade-in text-center relative overflow-hidden">
              {fase === 'respirar' && (
                <div className="anim-pop flex flex-col items-center">
                  <h2 className="text-4xl font-black text-teal-800 mb-8 uppercase tracking-wider">Pausa de Descanso</h2>
                  <div className="relative flex items-center justify-center w-64 h-64 mb-8">
                    <div className="absolute bg-teal-200 rounded-full opacity-50 animate-ping w-48 h-48" style={{animationDuration: '4s'}}></div>
                    <div className="absolute bg-teal-300 rounded-full opacity-70 animate-ping w-32 h-32" style={{animationDuration: '4s', animationDelay: '1s'}}></div>
                    <div className="text-[120px] z-10 drop-shadow-xl">🧘</div>
                  </div>
                  <div className="text-6xl font-black text-teal-600 drop-shadow-md">{segundos}</div>
                </div>
              )}
              {fase === 'boton' && (
                <div className="anim-pop flex flex-col items-center">
                  <h2 className="text-4xl font-black text-teal-800 mb-12 uppercase tracking-wider">¡Descanso Terminado!</h2>
                  <button onClick={abrirMiniJuego} className="btn-game bg-gradient-to-b from-yellow-400 to-yellow-600 border-4 border-yellow-800 shadow-[0_10px_0_rgb(161,98,7)] rounded-[3rem] py-8 px-12 text-4xl font-black text-white flex flex-col items-center gap-4">
                    <span className="text-6xl">🔓</span> DESBLOQUEAR
                  </button>
                </div>
              )}
              {fase === 'minijuego' && reto === 'buscar_letra' && (
                <div className="anim-pop flex flex-col items-center w-full max-w-md">
                  <h2 className="text-3xl font-black text-teal-800 mb-8">¡Encuentra la letra A!</h2>
                  <div className="grid grid-cols-2 gap-6 w-full">
                    {['X', 'M', 'A', 'T'].sort(() => Math.random() - 0.5).map((l, i) => (
                      <button key={i} onClick={() => { playPop(); l === 'A' ? resolverMiniJuego() : hablar("Uy, casi", 1); }} className="btn-game bg-white border-4 border-gray-300 rounded-2xl p-8 text-5xl font-black text-gray-800 shadow-[0_6px_0_rgb(209,213,219)] hover:bg-blue-50 hover:border-blue-400">{l}</button>
                    ))}
                  </div>
                </div>
              )}
              {fase === 'minijuego' && reto === 'tocar_letra' && (
                <div className="anim-pop flex flex-col items-center w-full max-w-md">
                  <h2 className="text-3xl font-black text-teal-800 mb-8">Toca para leer</h2>
                  <button onClick={resolverMiniJuego} className="btn-game bg-red-500 border-4 border-red-800 rounded-2xl p-12 text-7xl font-black text-white shadow-[0_8px_0_rgb(153,27,27)]">SOL ☀️</button>
                </div>
              )}
            </div>
          );
        }

        // PANEL DE ACOMPAÑANTE CON SELECTOR DE CATEGORÍAS
        function PanelAdultos({ estrellas, tiempo, estadisticas, volver, playPop, categoriaActiva, setCategoriaActiva }) {
          return (
            <div className="flex-1 flex flex-col p-6 bg-white rounded-3xl shadow-sm animate-fade-in border-4 border-gray-200">
              <div className="flex justify-between items-center mb-8 border-b-2 pb-4">
                <h2 className="text-3xl font-black text-gray-800 flex items-center gap-3"><IconChart className="text-blue-500"/> Panel de Acompañante</h2>
                <button onClick={() => { playPop(); volver(); }} className="text-blue-500 font-bold text-lg p-2 px-6 bg-blue-50 rounded-xl hover:bg-blue-100 transition-colors">Cerrar Panel</button>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div className="bg-slate-50 p-6 rounded-2xl border-2 border-slate-200 shadow-sm">
                  <h3 className="text-xl font-bold text-slate-700 mb-6 flex items-center gap-2"><IconActivity className="text-green-500"/> Rendimiento de Hoy</h3>
                  <ul className="space-y-4 text-lg">
                    <li className="flex justify-between items-center bg-white p-3 rounded-lg shadow-sm border border-slate-100"><span className="text-slate-600 font-medium">Estrellas Obtenidas:</span><span className="font-black text-yellow-500 text-2xl flex items-center gap-1">{estrellas} <IconStar size={20} className="text-yellow-500 fill-yellow-500"/></span></li>
                    <li className="flex justify-between items-center bg-white p-3 rounded-lg shadow-sm border border-slate-100"><span className="text-slate-600 font-medium">Tiempo de Sesión:</span><span className="font-black text-blue-600 text-xl">{Math.floor(tiempo / 60)} min {tiempo % 60} seg</span></li>
                  </ul>
                </div>
                <div className="bg-slate-50 p-6 rounded-2xl border-2 border-slate-200 shadow-sm">
                  <h3 className="text-xl font-bold text-slate-700 mb-6 flex items-center gap-2"><IconHeart className="text-red-500"/> Juegos Completados</h3>
                  <ul className="space-y-3 text-lg">
                    <li className="flex justify-between items-center"><span className="text-slate-600 flex items-center gap-2">🕷️ Lectura (Arañín):</span><span className="font-bold text-slate-800">{estadisticas.lectura}</span></li>
                    <li className="flex justify-between items-center"><span className="text-slate-600 flex items-center gap-2">⚡ Memoria (Flash):</span><span className="font-bold text-slate-800">{estadisticas.letras_rapidas}</span></li>
                    <li className="flex justify-between items-center"><span className="text-slate-600 flex items-center gap-2">🟢 Trazo (Hulk):</span><span className="font-bold text-slate-800">{estadisticas.escritura}</span></li>
                    <li className="flex justify-between items-center"><span className="text-slate-600 flex items-center gap-2">🛡️ Asociación (Capi):</span><span className="font-bold text-slate-800">{estadisticas.asociacion}</span></li>
                  </ul>
                </div>
              </div>

              {/* SECCIÓN NUEVA: SELECTOR DE CATEGORÍAS */}
              <div className="bg-blue-50 p-6 rounded-2xl border-2 border-blue-200 shadow-sm">
                 <h3 className="text-xl font-bold text-blue-800 mb-4 flex items-center gap-2"><IconSettings className="text-blue-500"/> Ajustes de Dificultad (Categoría Actual)</h3>
                 <p className="text-slate-600 mb-4">Selecciona el grupo de palabras que Lautaro practicará en Arañín y Capitán Valor:</p>
                 <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <button onClick={() => { playPop(); setCategoriaActiva('animales'); }} className={`p-4 rounded-xl font-bold border-2 transition-all ${categoriaActiva === 'animales' ? 'bg-blue-500 text-white border-blue-700 shadow-md' : 'bg-white text-slate-600 hover:bg-blue-100'}`}>🐶 Animales</button>
                    <button onClick={() => { playPop(); setCategoriaActiva('casa'); }} className={`p-4 rounded-xl font-bold border-2 transition-all ${categoriaActiva === 'casa' ? 'bg-blue-500 text-white border-blue-700 shadow-md' : 'bg-white text-slate-600 hover:bg-blue-100'}`}>🏠 Casa</button>
                    <button onClick={() => { playPop(); setCategoriaActiva('comida'); }} className={`p-4 rounded-xl font-bold border-2 transition-all ${categoriaActiva === 'comida' ? 'bg-blue-500 text-white border-blue-700 shadow-md' : 'bg-white text-slate-600 hover:bg-blue-100'}`}>🍎 Comida</button>
                    <button onClick={() => { playPop(); setCategoriaActiva('cortas'); }} className={`p-4 rounded-xl font-bold border-2 transition-all ${categoriaActiva === 'cortas' ? 'bg-blue-500 text-white border-blue-700 shadow-md' : 'bg-white text-slate-600 hover:bg-blue-100'}`}>☀️ Cortas (3 Letras)</button>
                 </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
